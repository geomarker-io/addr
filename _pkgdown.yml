url: https://geomarker.io/addr/
template:
  bootstrap: 5
  bslib:
    bg: "#FFFFFF"
    fg: "#396175"
    primary: "#C28273"
    info: "#EACEC5"
    warning: "#E49865"
    grid-gutter-width: 0.1rem
    border-radius: 0.2rem
    btn-border-radius: 0.2rem
    code_font:
      google: Source Code Pro
reference:
  - title: addr
    contents:
      - addr
      - as_addr
      - tag_usaddress
  - title: linking addr
    contents:
      - addr_left_join
      - addr_fuzzy_match
  - title: geocoding addr
    contents:
      - geocode_tiger
      - tiger_addr_feat
  - title: National Address Database
    contents:
      - nad_read
      - nad_download
      - nad_example_data
  - title: helper
    contents:
      - clean_address_text
      - fuzzy_match
      - impute_date_ranges
      - voter_addresses
      - elh_data
